services:
  mongo-database:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports: 
      - 27017:27017
  
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports: 
      - 3000
    depends_on:
      - mongo-database
    restart: always 
    
